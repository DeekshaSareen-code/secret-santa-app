<div class="app-container">
  <mat-card class="welcome-card">
    <mat-card-header>
      <mat-card-title>Secret Santa 🎅</mat-card-title>
      <mat-card-subtitle>Enter your details to join the fun!</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <!-- User Form -->
      <form (ngSubmit)="onSubmit()" #userForm="ngForm">
        <div class="form-group">
          <mat-form-field appearance="fill" class="form-field">
            <mat-label>Name</mat-label>
            <input matInput type="text" [(ngModel)]="user.name" name="name" required />
          </mat-form-field>
        </div>
        <div class="form-group">
          <mat-form-field appearance="fill" class="form-field">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="user.email" name="email" required />
          </mat-form-field>
        </div>
        <div class="form-group">
          <mat-form-field appearance="fill" class="form-field">
            <mat-label>Phone</mat-label>
            <input matInput type="text" [(ngModel)]="user.phone" name="phone" required />
          </mat-form-field>
        </div>

        <button mat-raised-button color="primary" type="submit" [disabled]="!userForm.valid">
          Join Secret Santa
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Secret Santa Email Sending -->
  <mat-card class="send-card">
    <mat-card-header>
      <mat-card-title>Send Secret Santa Matches</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>
        Once you're done entering your details, you can click below to send out the Secret Santa
        matches to all participants.
      </p>
      <button mat-raised-button color="accent" (click)="onSendSecretSanta()">
        Send Matches
      </button>
    </mat-card-content>
  </mat-card>
</div>
